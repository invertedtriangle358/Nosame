<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>野雨 - Nosame -</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1 class="sawarabi-mincho-regular title-ruby">
      <ruby>
       　<rt>野雨-Nosame-</rt>
      </ruby>
    </h1>
    <div class="header-actions">
      <button id="btnRelayModal" type="button">リレー</button>
      <button id="btnNgModal" type="button">NG</button>
    </div>
  </header>

  <main>
    <div id="relayModal" class="modal" aria-hidden="true">
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="relayModalTitle">
        <h2 id="relayModalTitle" tabindex="-1">リレー設定</h2>
        <div id="relayList"></div>

        <div class="relay-add-area">
          <input id="relayInput" type="text" placeholder="wss://example.com" />
          <button id="btnAddRelay" type="button">追加</button>
        </div>

        <div class="modal-actions">
          <button id="btnSaveRelays" type="button">保存</button>
          <button id="btnCloseModal" type="button">閉じる</button>
        </div>
      </div>
    </div>

    <div id="ngModal" class="modal" aria-hidden="true">
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="ngModalTitle">
        <h2 id="ngModalTitle">NGワード設定</h2>

        <div id="ngWordList" class="ng-list"></div>
        <div class="ng-add-area">
          <input id="ngWordInput" type="text" placeholder="NGワードを追加" />
          <button id="btnAddNgWord" type="button">追加</button>
        </div>

        <div class="modal-actions">
          <button id="btnSaveNgWords" type="button">保存</button>
          <button id="btnCloseNgModal" type="button">閉じる</button>
        </div>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <button id="btnPublish" type="button" aria-label="投稿する">投稿</button>
      </div>
      <div class="composer">
        <textarea id="compose" placeholder="本文を入力......"></textarea>
        <small id="charCount">0 / 108</small>
      </div>
    </aside>

    <section class="timeline-wrap">
      <div class="timeline-controls">
        <button id="scrollLeft" type="button" aria-label="左へスクロール">←</button>
        <button id="scrollRight" type="button" aria-label="右へスクロール">→</button>
      </div>
      <div id="timeline" class="vertical-timeline empty" aria-live="polite"></div>
    </section>
  </main>

  <footer></footer>
  <script src="app.js"></script>
</body>
</html>
