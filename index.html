<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>野雨 - Nosame -</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
</head>
<body>
  <div id="menuBackdrop" class="menu-backdrop" aria-hidden="true"></div>

  <header>
    <h1 class="sawarabi-mincho-regular title-ruby">
      <ruby>
        野雨<rt>-Nosame-</rt>
      </ruby>
    </h1>
    <div class="header-actions">
      <button
        id="btnMenu"
        class="menu-toggle"
        type="button"
        aria-label="Open settings"
        aria-expanded="false"
        aria-controls="settingsPanel"
      >
        Menu
      </button>
    </div>
  </header>

  <main>
    <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div
        class="settings-panel-inner"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settingsPanelTitle"
      >
        <div class="settings-panel-header">
          <div>
            <p class="settings-kicker">Settings</p>
            <h2 id="settingsPanelTitle" tabindex="-1">Customize Nosame</h2>
          </div>
          <button
            id="btnCloseMenu"
            class="settings-close"
            type="button"
            aria-label="Close settings"
          >
            Close
          </button>
        </div>

        <section class="settings-section" aria-labelledby="relaySectionTitle">
          <div class="settings-section-header">
            <h3 id="relaySectionTitle">Relay Settings</h3>
            <button id="btnSaveRelays" type="button">Save</button>
          </div>

          <div id="relayList"></div>

          <div class="relay-add-area">
            <input id="relayInput" type="text" placeholder="wss://example.com" />
            <button id="btnAddRelay" type="button">Add</button>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="ngSectionTitle">
          <div class="settings-section-header">
            <h3 id="ngSectionTitle">NG Word Settings</h3>
            <button id="btnSaveNgWords" type="button">Save</button>
          </div>

          <div id="ngWordList" class="ng-list"></div>

          <div class="ng-add-area">
            <input id="ngWordInput" type="text" placeholder="Add an NG word" />
            <button id="btnAddNgWord" type="button">Add</button>
          </div>
        </section>
      </div>
    </aside>

    <aside class="sidebar">
      <div class="sidebar-header">
        <button id="btnPublish" type="button" aria-label="投稿する">投稿</button>
      </div>
      <div class="composer">
        <textarea id="compose" placeholder="本文を入力......"></textarea>
        <small id="charCount">0 / 108</small>
      </div>
    </aside>

    <section class="timeline-wrap">
      <div class="timeline-controls">
        <button id="scrollLeft" type="button" aria-label="左へスクロール">←</button>
        <button id="scrollRight" type="button" aria-label="右へスクロール">→</button>
      </div>
      <div id="timeline" class="vertical-timeline empty" aria-live="polite"></div>
    </section>
  </main>

  <footer></footer>
  <script src="app.js"></script>
</body>
</html>
