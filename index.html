<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>野雨 - Nosame -</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
</head>
<body>
  <div id="menuBackdrop" class="menu-backdrop" aria-hidden="true"></div>

  <header>
    <h1 class="sawarabi-mincho-regular title-ruby">
      <ruby>
        野雨<rt>-Nosame-</rt>
      </ruby>
    </h1>
    <div class="header-actions">
      <button
        id="btnMenu"
        class="menu-toggle"
        type="button"
        aria-label="設定を開く"
        aria-expanded="false"
        aria-controls="settingsPanel"
      >
        三
      </button>
    </div>
  </header>

  <main>
    <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div
        class="settings-panel-inner"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settingsPanelTitle"
      >
        <div class="settings-panel-header">
          <div>
            <p class="settings-kicker">Customize</p>
            <h2 id="settingsPanelTitle" tabindex="-1">設定</h2>
          </div>
          <button
            id="btnCloseMenu"
            class="settings-close"
            type="button"
            aria-label="設定を閉じる"
          >
            ×
          </button>
        </div>

        <section class="settings-section" aria-labelledby="relaySectionTitle">
          <div class="settings-section-header">
            <h3 id="relaySectionTitle">接続</h3>
            <button id="btnSaveRelays" type="button">保存</button>
          </div>

          <div id="relayList"></div>

          <div class="relay-add-area">
            <input id="relayInput" type="text" placeholder="wss://example.com" />
            <button id="btnAddRelay" type="button">追加</button>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="ngSectionTitle">
          <div class="settings-section-header">
            <h3 id="ngSectionTitle">禁句</h3>
            <button id="btnSaveNgWords" type="button">保存</button>
          </div>

          <div id="ngWordList" class="ng-list"></div>

          <div class="ng-add-area">
            <input id="ngWordInput" type="text" placeholder="NGワードを追加" />
            <button id="btnAddNgWord" type="button">追加</button>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="blockSectionTitle">
          <div class="settings-section-header">
            <h3 id="blockSectionTitle">遮断</h3>
            <button id="btnSaveBlockedPubkeys" type="button">保存</button>
          </div>

          <div id="blockedPubkeyList" class="ng-list"></div>

          <div class="ng-add-area">
            <input id="blockedPubkeyInput" type="text" placeholder="NG公開鍵を追加" />
            <button id="btnAddBlockedPubkey" type="button">追加</button>
          </div>
        </section>
      </div>
    </aside>

    <aside class="sidebar">
      <div class="sidebar-header">
        <button id="btnPublish" type="button" aria-label="投稿する">投稿</button>
      </div>
      <div class="composer">
        <textarea id="compose" placeholder="本文を入力......"></textarea>
        <small id="charCount">0 / 108</small>
      </div>
    </aside>

    <section class="timeline-wrap">
      <div class="timeline-controls">
        <button id="scrollLeft" type="button" aria-label="左へスクロール">←</button>
        <button id="scrollRight" type="button" aria-label="右へスクロール">→</button>
      </div>
      <div id="timeline" class="vertical-timeline empty" aria-live="polite"></div>
      
      <section id="profilePage" class="profile-page" aria-hidden="true">
        <div class="profile-actions">
          <button id="btnBackToTimeline" type="button">戻る</button>
        </div>
        <div class="profile-hero">
          <div id="profileBio" class="profile-bio"></div>
          <div id="profileName" class="profile-name"></div>
          <div class="profile-icon-shell">
            <div id="profileIconFallback" class="profile-icon-fallback"></div>
            <img id="profileIcon" class="profile-icon-large" alt="Profile icon" hidden />
          </div>
        </div>
        <div id="profilePubkey" class="profile-pubkey"></div>
        <div id="profileTimeline" class="vertical-timeline profile-timeline" aria-live="polite"></div>
      </section>
      
    </section>
  </main>

  <footer></footer>
  <script type="module" src="main.js"></script>
</body>
</html>
